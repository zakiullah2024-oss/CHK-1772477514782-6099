<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Crop Advisory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(17, 23, 30, 0.7), rgba(30, 130, 76, 0.8)), url('https://images.unsplash.com/photo-1586771107445-d3ca888129ff?auto=format&fit=crop&q=80') center/cover no-repeat;
            overflow: hidden;
        }

        /* 🍃 Floating Background Animation */
        .circles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; z-index: -1; }
        .circles li { position: absolute; display: block; list-style: none; width: 20px; height: 20px; background: rgba(255, 255, 255, 0.2); animation: animate 25s linear infinite; bottom: -150px; border-radius: 50%; }
        .circles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .circles li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .circles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .circles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .circles li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* 💎 Glassmorphism Login Card */
        .login-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-logo {
            font-size: 3.5rem;
            color: #2ecc71;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        .login-title {
            color: white;
            font-weight: bold;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        /* ✨ Input Styling */
        .input-group-text {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-right: none;
            color: white;
        }
        .form-control {
            background: transparent !important;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-left: none;
            color: white !important;
        }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.7); }
        .form-control:focus {
            box-shadow: none;
            border-color: #2ecc71;
            background: rgba(255, 255, 255, 0.1) !important;
        }
        .input-group:focus-within .input-group-text { border-color: #2ecc71; color: #2ecc71; }

        /* 🔘 Login Button */
        .btn-login {
            background: linear-gradient(45deg, #198754, #2ecc71);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-login:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.4);
            color: white;
        }

        .error-msg { color: #ff6b6b; font-size: 0.9rem; margin-bottom: 15px; font-weight: bold; }
        .hint { color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-top: 20px; }
    </style>
</head>
<body>

    <ul class="circles">
        <li></li><li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="login-glass animate__animated animate__zoomIn">
        <i class="fa-solid fa-leaf login-logo"></i>
        <h2 class="login-title">Smart Crop Advisory</h2>
        
        {% if error %}
        <div class="error-msg animate__animated animate__headShake">
            <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="input-group mb-4 shadow-sm">
                <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Username" required autocomplete="off">
            </div>
            
            <div class="input-group mb-4 shadow-sm">
                <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn btn-login w-100">
                Secure Login <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
            </button>
        </form>

    </div>

</body>
</html>
